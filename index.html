<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exa-Tech | Miner Control — Bajo del Toro</title>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161b26;
    --border: #222840;
    --accent: #00c2ff;
    --accent2: #7c3aed;
    --ok: #22c55e;
    --warn: #f59e0b;
    --error: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --font: 'Segoe UI', system-ui, sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:var(--font); min-height:100vh; }

  /* TOP BAR */
  header {
    display:flex; align-items:center; justify-content:space-between;
    padding:0 32px; height:60px;
    background:var(--surface); border-bottom:1px solid var(--border);
    position:sticky; top:0; z-index:100;
  }
  .logo { display:flex; align-items:center; gap:10px; font-weight:700; font-size:1.1rem; letter-spacing:.05em; }
  .logo-dot { width:10px; height:10px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent); }
  .site-tag { color:var(--muted); font-size:.85rem; }
  .live-badge {
    display:flex; align-items:center; gap:6px;
    background:rgba(34,197,94,.1); border:1px solid rgba(34,197,94,.3);
    color:var(--ok); padding:4px 12px; border-radius:20px; font-size:.8rem;
  }
  .live-dot { width:7px; height:7px; border-radius:50%; background:var(--ok); animation:pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* MAIN */
  main { padding:32px; max-width:1400px; margin:0 auto; }

  /* SUMMARY CARDS */
  .summary { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:36px; }
  .stat-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; padding:20px 24px;
  }
  .stat-label { font-size:.75rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:8px; }
  .stat-value { font-size:2rem; font-weight:700; }
  .stat-value.ok { color:var(--ok); }
  .stat-value.error { color:var(--error); }
  .stat-value.warn { color:var(--warn); }
  .stat-value.accent { color:var(--accent); }
  .stat-sub { font-size:.8rem; color:var(--muted); margin-top:4px; }

  /* SECTION TITLE */
  .section-title {
    font-size:.7rem; text-transform:uppercase; letter-spacing:.15em;
    color:var(--muted); margin-bottom:16px; padding-bottom:8px;
    border-bottom:1px solid var(--border);
  }

  /* DTC GRID */
  .dtc-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }
  .dtc-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:14px; padding:22px; cursor:pointer;
    transition:border-color .2s, transform .15s;
    text-decoration:none; color:inherit; display:block;
  }
  .dtc-card:hover { border-color:var(--accent); transform:translateY(-2px); }
  .dtc-card.has-failures { border-color:rgba(239,68,68,.4); }
  .dtc-card.has-failures:hover { border-color:var(--error); }

  .dtc-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px; }
  .dtc-name { font-size:1.1rem; font-weight:700; }
  .dtc-id { font-size:.7rem; color:var(--muted); margin-top:2px; font-family:monospace; }
  .fail-badge {
    background:rgba(239,68,68,.15); border:1px solid rgba(239,68,68,.4);
    color:var(--error); padding:3px 10px; border-radius:20px;
    font-size:.75rem; font-weight:600; white-space:nowrap;
  }
  .ok-badge {
    background:rgba(34,197,94,.1); border:1px solid rgba(34,197,94,.3);
    color:var(--ok); padding:3px 10px; border-radius:20px;
    font-size:.75rem; font-weight:600;
  }

  .dtc-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
  .mini-stat { background:var(--bg); border-radius:8px; padding:10px 12px; }
  .mini-stat-label { font-size:.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
  .mini-stat-val { font-size:1.1rem; font-weight:700; margin-top:2px; }

  .dtc-footer { margin-top:14px; padding-top:12px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
  .dtc-layout { font-size:.75rem; color:var(--muted); }
  .dtc-link { font-size:.75rem; color:var(--accent); font-weight:600; }

  /* ERROR BREAKDOWN */
  .error-table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:22px; margin-top:36px; }
  table { width:100%; border-collapse:collapse; }
  th { text-align:left; font-size:.7rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); padding:8px 12px; border-bottom:1px solid var(--border); }
  td { padding:12px; font-size:.85rem; border-bottom:1px solid rgba(34,40,64,.5); }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:rgba(255,255,255,.02); }
  .tag { display:inline-block; padding:2px 8px; border-radius:4px; font-size:.75rem; font-weight:600; }
  .tag-error { background:rgba(239,68,68,.15); color:var(--error); }
  .tag-warn { background:rgba(245,158,11,.15); color:var(--warn); }
  .tag-ok { background:rgba(34,197,94,.1); color:var(--ok); }
  .mono { font-family:monospace; font-size:.8rem; color:var(--muted); }

  footer { text-align:center; padding:32px; color:var(--muted); font-size:.8rem; border-top:1px solid var(--border); margin-top:48px; }

  @media(max-width:900px){
    .dtc-grid { grid-template-columns:1fr 1fr; }
    .summary { grid-template-columns:1fr 1fr; }
  }
  @media(max-width:580px){
    .dtc-grid { grid-template-columns:1fr; }
    .summary { grid-template-columns:1fr 1fr; }
    main { padding:16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    EXA-TECH
    <span class="site-tag">/ Bajo del Toro</span>
  </div>
  <div class="live-badge">
    <div class="live-dot"></div>
    EN VIVO
  </div>
</header>
